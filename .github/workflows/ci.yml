name: CI — 앱 무결성 검사

on:
  push:
    branches: [main]
    paths-ignore:
      - "cache/**"          # 자동 수집 봇 커밋엔 테스트 안 돌림(불필요)
      - "assets/**"
      - "**.md"
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 패키지 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 스모크 테스트 (문법·모듈·데이터·전 경로 렌더)
        run: python _smoketest.py
