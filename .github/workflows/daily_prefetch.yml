name: 하루 2회 종목 캐시 수집 (오전 6시·오후 6시 KST)

on:
  schedule:
    # 매일 21:00 UTC = 한국시간 오전 6:00 KST
    - cron: "0 21 * * *"
    # 매일 09:00 UTC = 한국시간 오후 6:00 KST
    - cron: "0 9 * * *"
  workflow_dispatch:  # 수동 실행 버튼도 활성화

jobs:
  prefetch:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: buffett_bot

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 패키지 설치
        run: pip install -q yfinance pandas numpy

      - name: 캐시 디렉토리 생성
        run: mkdir -p cache

      - name: 전체 종목 사전 분석 (점수·적정가·조언까지 계산)
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          PRECOMPUTE_TECH: "1"   # 뉴스(기술변곡점)까지 수집. 끄려면 "0"
        run: python precompute.py all

      - name: 결과 파일 커밋 & 푸시
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f cache/results_kr.json cache/results_us.json cache/market_indicators.json
          # 변경사항이 있을 때만 커밋
          git diff --staged --quiet || git commit -m "chore: 일일 전체 분석 자동 수집 $(date +'%Y-%m-%d %H:%M KST+9')"
          git push
