name: 하루 2회 종목 캐시 수집 (오전 6시·오후 6시 KST)

on:
  schedule:
    # 매일 21:00 UTC = 한국시간 오전 6:00 KST
    - cron: "0 21 * * *"
    # 매일 09:00 UTC = 한국시간 오후 6:00 KST
    - cron: "0 9 * * *"
  workflow_dispatch:  # 수동 실행 버튼도 활성화

permissions:
  contents: write

concurrency:
  group: daily-prefetch
  cancel-in-progress: false

jobs:
  collect:
    # 국장·미장을 별도 러너(서로 다른 IP)에서 병렬 수집 →
    # 미장이 국장 수집으로 인한 rate-limit을 물려받지 않아 갱신 성공률↑
    strategy:
      fail-fast: false
      matrix:
        market: [kr, us]
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 패키지 설치
        run: |
          python -m pip install --upgrade pip
          pip install -q yfinance pandas numpy requests

      - name: 캐시 디렉토리 생성
        run: mkdir -p cache

      - name: ${{ matrix.market }} 사전 분석 (점수·적정가·조언까지)
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          PRECOMPUTE_TECH: "1"
          PRECOMPUTE_WORKERS: "10"   # 단일 시장만 받으므로 약간 상향
        run: python precompute.py ${{ matrix.market }}

      - name: 환율·금리 수집 (국장 작업에서만)
        if: matrix.market == 'kr'
        run: python -c "from precompute import collect_market_indicators; collect_market_indicators()"

      - name: 결과 커밋 & 푸시 (충돌 시 자동 재시도)
        run: |
          set -e
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [ "${{ matrix.market }}" = "kr" ]; then
            git add -f cache/results_kr.json cache/market_indicators.json
          else
            git add -f cache/results_us.json
          fi

          if git diff --staged --quiet; then
            echo "변경사항 없음 — 커밋 생략"
            exit 0
          fi

          git commit -m "chore: ${{ matrix.market }} 자동 수집 $(date +'%Y-%m-%d %H:%M KST+9')"

          # 두 시장 작업이 동시에 푸시하므로 rebase 후 재시도(최대 6회)
          for i in 1 2 3 4 5 6; do
            if git push origin HEAD:main; then
              echo "푸시 성공 (시도 $i)"
              exit 0
            fi
            echo "푸시 실패 — 원격 재동기화 후 재시도 ($i/6)"
            git pull --rebase --autostash origin main || true
            sleep $((RANDOM % 8 + 3))
          done

          echo "::error::6회 시도 후에도 푸시 실패"
          exit 1
